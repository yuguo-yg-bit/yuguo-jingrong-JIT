<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 页面未找到</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0a0e27 0%, #1a237e 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: #e0e0e0;
}
.container {
  text-align: center;
  padding: 40px;
  border: 1px solid rgba(66, 165, 245, 0.3);
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  max-width: 500px;
}
h1 {
  font-size: 72px;
  color: #42a5f5;
  margin-bottom: 16px;
  text-shadow: 0 0 40px rgba(66, 165, 245, 0.5);
}
p {
  font-size: 16px;
  color: #9e9e9e;
  margin-bottom: 24px;
  line-height: 1.6;
}
a {
  display: inline-block;
  padding: 12px 32px;
  background: rgba(66, 165, 245, 0.2);
  border: 1px solid #42a5f5;
  border-radius: 8px;
  color: #42a5f5;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
}
a:hover {
  background: rgba(66, 165, 245, 0.4);
  box-shadow: 0 0 20px rgba(66, 165, 245, 0.5);
}
</style>
<script>
// 自动重定向：如果URL不以index.html结尾，自动加上
(function() {
  var path = window.location.pathname;
  if (path && path !== "/" && !path.endsWith("index.html") && !path.endsWith("AdMiN_AdMiN.html") && !path.endsWith("404.html") && !path.match(/\.(css|js|png|jpg|jpeg|gif|svg|ico|json|xml|txt|woff|woff2|ttf|eot)$/)) {
    window.location.replace("/index.html");
  }
})();
</script>
</head>
<body>
<div class="container">
  <h1>404</h1>
  <p>页面未找到<br>您访问的页面不存在或已被移除。</p>
  <a href="index.html">返回首页</a>
</div>
</body>
</html>
